<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>proxydite</title>
    <style>
        body {
            background-color: #000;
            font-family: 'Courier New', monospace;
            color: #0F0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #terminal {
            border: 2px solid #0F0;
            padding: 20px;
            max-width: 800px;
            text-align: center;
        }
        h2 {
            font-size: 2em;
            margin-bottom: 1.5em;
        }
        p {
            line-height: 1.5em;
            margin: 0.5em 0;
        }
        pre {
            text-align: left;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div id="terminal">
        <h2>proxydite</h2>
        <pre id="ascii-art"></pre>
        <button onclick="enterSite()">ENTER</button>
    </div>
    <script>
        async function fetchAsciiArt() {
            const response = await fetch('ascii_art.txt');
            const text = await response.text();
            document.getElementById('ascii-art').textContent = text;
        }
        fetchAsciiArt();
        
        function enterSite() {
            window.location.href = "../home/home.html";
        }
    </script>
</body>
</html>
